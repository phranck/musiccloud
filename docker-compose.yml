version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: musiccloud
      POSTGRES_PASSWORD: dev-password-local-only
      POSTGRES_DB: musiccloud
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musiccloud"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
