<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>musiccloud vinyl record mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Michroma&family=Roboto+Condensed:wght@500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --color-background: #0a0a0c;
  --color-surface: #161618;
  --color-surface-elevated: #1c212b;
  --color-accent: #28a8d8;
  --color-accent-hot: #ffd12a;
  --color-text-primary: #f5f5f7;
  --color-text-secondary: #c7c7cc;
  --color-text-muted: #9a9aa0;
  --color-border: #38383a;
  --color-control-surface: #1f242f;
  --color-control-surface-hover: #283040;
  --font-sans: "Barlow", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-condensed: "Roboto Condensed", "Barlow", sans-serif;
  --neu-default-light: hsl(0 0% 100% / 0.18);
  --neu-default-shadow: hsl(0 0% 0% / 0.35);
  --neu-mask: #fff;
  --mc-card-radius: 28px;
  --mc-pad-card: 12px;
  --mc-pad-header: 10px;
  --mc-pad-header-b: 0px;
  --mc-pad-recessed: 3px;
  --mc-pad-track: 3px;
  --mc-pad-tracktime: 8px;
  --mc-gap-cards: 22px;
  --mc-gap-list: 3px;
  --mc-gap-rowitem: 12px;
  --mc-recessed-radius: max(0px, calc(var(--mc-card-radius) - var(--mc-pad-card)));
  --mc-control-radius: max(0px, calc(var(--mc-recessed-radius) - var(--mc-pad-recessed)));
  --mc-cover-radius: max(0px, calc(var(--mc-recessed-radius) - 2px));
  --mc-control-radius-inner: min(5px, var(--mc-control-radius));
  --mc-card-chrome-x: calc(var(--mc-pad-card) + var(--mc-recessed-radius) / 2);
  --record-spin-duration: 1.791s;
}

* { box-sizing: border-box; }

html {
  min-height: 100%;
  color-scheme: dark;
  background: var(--color-background);
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--font-sans);
  color: var(--color-text-primary);
  background:
    linear-gradient(145deg, rgba(40, 168, 216, 0.18), transparent 28%),
    linear-gradient(220deg, rgba(255, 209, 42, 0.12), transparent 24%),
    radial-gradient(circle at 50% -20%, #263247 0, #11151f 42%, #08090c 82%);
}

button {
  font: inherit;
}

/* Demo shell */
.stage {
  min-height: 100vh;
  padding: 44px 20px 76px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.stage-inner {
  width: 100%;
  max-width: 32rem;
  display: flex;
  flex-direction: column;
  gap: var(--mc-gap-cards);
}

.embossed-card,
.section-card,
.recessed-card,
.emb-btn {
  position: relative;
}

.embossed-card::before,
.section-card::before,
.recessed-card::before,
.emb-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 2;
  padding: 1px;
  border-radius: inherit;
  -webkit-mask: linear-gradient(var(--neu-mask) 0 0) content-box, linear-gradient(var(--neu-mask) 0 0);
  -webkit-mask-composite: xor;
  mask: linear-gradient(var(--neu-mask) 0 0) content-box, linear-gradient(var(--neu-mask) 0 0);
  mask-composite: exclude;
  pointer-events: none;
  transform: translateZ(0);
}

.embossed-card::before,
.section-card::before,
.emb-btn::before {
  background: linear-gradient(to bottom right,
    var(--neu-light), var(--neu-light) calc(50% - var(--neu-radius) / 2.5),
    var(--neu-shadow) calc(50% + var(--neu-radius) / 2.5), var(--neu-shadow));
}

.recessed-card::before {
  background: linear-gradient(to bottom right,
    var(--neu-shadow), var(--neu-shadow) calc(50% - var(--neu-radius) / 2.5),
    var(--neu-light) calc(50% + var(--neu-radius) / 2.5), var(--neu-light));
}

.embossed-card,
.section-card {
  overflow: hidden;
  border-radius: var(--mc-card-radius);
  background-color: var(--color-surface-elevated);
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4), 0 -2px 6px rgba(255, 255, 255, 0.03);
  --neu-radius: 1.375rem;
  --neu-light: var(--neu-default-light);
  --neu-shadow: var(--neu-default-shadow);
}

.recessed-card {
  overflow: hidden;
  border-radius: var(--mc-recessed-radius);
  background-color: rgba(0, 0, 0, 0.25);
  box-shadow: inset 1px 1px 4px rgba(0, 0, 0, 0.25);
  --neu-radius: 0.625rem;
  --neu-light: var(--neu-default-light);
  --neu-shadow: transparent;
}

.emb-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border: 0;
  cursor: pointer;
  color: var(--color-text-primary);
  border-radius: var(--mc-control-radius-inner);
  background-color: var(--color-control-surface);
  box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.12), inset -1px -1px 0 rgba(0, 0, 0, 0.48);
  transition: background-color 0.05s ease-out, color 0.15s ease-out;
  --neu-radius: 0.4375rem;
  --neu-light: transparent;
  --neu-shadow: transparent;
}

.emb-btn:hover {
  background-color: var(--color-control-surface-hover);
}

.emb-btn:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
}

.cover-pad {
  padding: var(--mc-pad-card) var(--mc-pad-card) 0;
}

.section-pad {
  padding: 0 var(--mc-pad-card) var(--mc-pad-card);
}

.section-head {
  padding: var(--mc-pad-header) var(--mc-card-chrome-x) var(--mc-pad-header-b);
}

.section-title {
  font-family: var(--font-condensed);
  font-size: 0.875rem;
  line-height: 1;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-text-secondary);
}

.record-recessed {
  padding: 2px;
}

/* Turntable component */
.media-screen {
  position: relative;
  aspect-ratio: 1 / 1;
  width: 100%;
  overflow: hidden;
  isolation: isolate;
  border-radius: var(--mc-cover-radius);
  background:
    linear-gradient(142deg, rgba(255, 255, 255, 0.07), transparent 32%),
    linear-gradient(318deg, rgba(0, 0, 0, 0.44), transparent 46%),
    #171a1f;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.08),
    inset 0 18px 38px rgba(255, 255, 255, 0.045),
    inset 0 -28px 48px rgba(0, 0, 0, 0.68);
}

.media-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.18;
  background-image:
    linear-gradient(90deg, rgba(255, 255, 255, 0.028), transparent 24%, transparent 76%, rgba(0, 0, 0, 0.16)),
    repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 3px);
}

.turntable-bed {
  position: absolute;
  inset: 0;
  z-index: 2;
  overflow: hidden;
  border-radius: inherit;
  background: linear-gradient(180deg, #262b34 0%, #181d24 56%, #0f1319 100%);
}

.turntable-platter {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 1;
  width: calc(86% - 4px);
  aspect-ratio: 1 / 1;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: linear-gradient(180deg, #20262e 0%, #161b22 100%);
  box-shadow:
    0 0 0 2px rgba(5, 7, 10, 0.92),
    0 0 0 4px rgba(71, 78, 90, 0.52),
    0 1px 0 rgba(255, 255, 255, 0.12),
    inset 0 1px 1px rgba(255, 255, 255, 0.08),
    inset 0 -2px 3px rgba(0, 0, 0, 0.38);
}

.turntable-brand {
  position: absolute;
  left: 5.2%;
  top: 5.2%;
  z-index: 4;
  display: grid;
  width: clamp(2.72rem, 10.2%, 3.05rem);
  gap: 0.18em;
  color: rgba(244, 247, 250, 0.86);
  font-family: "Michroma", var(--font-sans);
  font-size: clamp(0.48rem, 1.72vw, 0.62rem);
  line-height: 1;
  text-transform: lowercase;
}

.turntable-brand-word {
  display: flex;
  justify-content: space-between;
  width: 100%;
}

.turntable-brand-word.is-cloud {
  color: rgba(255, 255, 255, 0.96);
  font-weight: 900;
}

.turntable-control {
  position: absolute;
  left: 3.1%;
  bottom: 3.1%;
  z-index: 3;
  width: 19%;
  aspect-ratio: 1 / 1;
  color: rgba(235, 239, 244, 0.78);
  font-family: var(--font-condensed);
  font-size: clamp(0.32rem, 1.24vw, 0.45rem);
  line-height: 1;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.turntable-knob {
  position: absolute;
  right: 0;
  bottom: 0;
  width: 73%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  background:
    radial-gradient(circle at 48% 48%,
      #252b35 0 56%,
      #0b0e13 57.5% 59%,
      #333944 60% 61.2%,
      #090b0f 62% 100%),
    linear-gradient(145deg, rgba(255, 255, 255, 0.075), transparent 34%);
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.9),
    0 1px 0 rgba(255, 255, 255, 0.13),
    0 3px 4px rgba(0, 0, 0, 0.45),
    inset 0 0 0 1px rgba(255, 255, 255, 0.07),
    inset 0 -3px 5px rgba(0, 0, 0, 0.32);
}

.turntable-label {
  position: absolute;
  z-index: 2;
  right: auto;
  white-space: nowrap;
  color: rgba(236, 240, 246, 0.72);
  font-weight: 700;
}

.turntable-label.is-33 {
  left: 16.7%;
  top: 36.5%;
  transform: translateY(-100%);
}

.turntable-label.is-45 {
  left: 39.5%;
  top: 21.9%;
  transform: translateY(-100%);
}

.turntable-label.is-on {
  left: 15.5%;
  top: 63.5%;
  transform: translate(-100%, -50%);
}

.turntable-label.is-standby {
  left: 21.9%;
  top: 87.5%;
  transform: translateX(-100%);
}

.turntable-knob::after {
  content: "";
  position: absolute;
  right: 50%;
  top: 50%;
  width: 38%;
  height: 2px;
  transform: translateY(-50%) rotate(30deg);
  transform-origin: right center;
  border-radius: 999px;
  background: rgba(222, 228, 236, 0.48);
}

.turntable-led {
  position: absolute;
  right: 6.2%;
  bottom: 6%;
  z-index: 4;
  width: calc(2.1% - 1px);
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  overflow: visible;
  background:
    radial-gradient(circle at 35% 30%,
      #f0ffd8 0 11%,
      #8dff8c 18%,
      #2fc956 52%,
      #0b4f26 100%);
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.7),
    0 0 4px rgba(104, 255, 122, 0.24),
    0 0 12px rgba(48, 210, 83, 0.11),
    0 0 22px rgba(48, 210, 83, 0.06),
    inset 0 1px 1px rgba(255, 255, 255, 0.58),
    inset 0 -1px 2px rgba(0, 0, 0, 0.48);
  pointer-events: none;
}

.turntable-led::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: -1;
  width: 430%;
  aspect-ratio: 1 / 1;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle,
      rgba(118, 255, 133, 0.34) 0 12%,
      rgba(54, 218, 83, 0.19) 26%,
      rgba(45, 186, 75, 0.09) 43%,
      transparent 66%);
  filter: blur(2px);
}

.turntable-spindle {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 9;
  width: 2.15%;
  aspect-ratio: 1 / 1;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle at 34% 28%,
      #ffffff 0 9%,
      #dfe5ea 14% 25%,
      #8f979e 43%,
      #343a40 68%,
      #eef2f5 100%);
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.76),
    0 1px 2px rgba(0, 0, 0, 0.48),
    inset 0 1px 1px rgba(255, 255, 255, 0.72),
    inset 0 -1px 1px rgba(0, 0, 0, 0.58);
  pointer-events: none;
}

.slot-lip {
  position: absolute;
  left: 50%;
  top: 0;
  z-index: 8;
  width: 60%;
  height: 9px;
  transform: translateX(-50%);
  border-radius: 0 0 999px 999px;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.46), rgba(255, 255, 255, 0.045));
  box-shadow: 0 7px 15px rgba(0, 0, 0, 0.32);
  opacity: 0.58;
}

/* VinylRecord component */
.vinyl-record-stage {
  --drop-to: -50%;
  position: absolute;
  left: 50%;
  top: 50%;
  aspect-ratio: 1 / 1;
  transform: translate(-50%, var(--drop-to));
  animation: record-drop 760ms cubic-bezier(0.2, 0.86, 0.2, 1) both;
}

.vinyl-record-stage.is-main {
  --drop-from: -126%;
  z-index: 5;
  width: 86%;
}

.vinyl-record-stage.is-tile {
  --drop-from: -132%;
  z-index: 3;
  width: 150%;
  animation: record-drop 620ms cubic-bezier(0.2, 0.86, 0.2, 1) both;
}

.vinyl-ground-shadow {
  position: absolute;
  inset: 1.5%;
  z-index: 0;
  border-radius: 50%;
  transform: translateY(3.5%) scale(0.99);
  background:
    radial-gradient(ellipse at 50% 58%,
      rgba(0, 0, 0, 0.58) 0 34%,
      rgba(0, 0, 0, 0.26) 54%,
      transparent 73%);
  filter: blur(8px);
  pointer-events: none;
}

.vinyl-record {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  transform-origin: 50% 50%;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 18.5%, rgba(0, 0, 0, 0.98) 18.8% 20.2%, transparent 20.6%),
    radial-gradient(circle at 50% 50%,
      transparent 0 26.2%,
      rgba(255, 255, 255, 0.055) 26.5%,
      rgba(0, 0, 0, 0.68) 26.9%,
      transparent 27.6%,
      transparent 39.8%,
      rgba(255, 255, 255, 0.05) 40.1%,
      rgba(0, 0, 0, 0.64) 40.45%,
      transparent 41.1%,
      transparent 54.6%,
      rgba(255, 255, 255, 0.048) 54.9%,
      rgba(0, 0, 0, 0.62) 55.25%,
      transparent 55.95%,
      transparent 68.4%,
      rgba(255, 255, 255, 0.05) 68.7%,
      rgba(0, 0, 0, 0.66) 69.08%,
      transparent 69.85%,
      transparent 80.6%,
      rgba(255, 255, 255, 0.045) 80.9%,
      rgba(0, 0, 0, 0.58) 81.28%,
      transparent 82%,
      transparent 100%),
    repeating-radial-gradient(circle at 50% 50%,
      rgba(255, 255, 255, 0.034) 0 1px,
      transparent 1px 5px,
      rgba(255, 255, 255, 0.014) 5px 6px,
      transparent 6px 10px),
    repeating-conic-gradient(from 0deg, rgba(255, 255, 255, 0.009) 0deg 0.8deg, transparent 0.8deg 7deg),
    radial-gradient(circle at 50% 50%, #232527 0, #111214 54%, #030304 100%);
  box-shadow:
    inset 0 0 0 2px rgba(255, 255, 255, 0.05),
    inset 0 0 0 7px rgba(0, 0, 0, 0.56),
    inset 0 0 28px rgba(255, 255, 255, 0.065),
    inset 0 -15px 30px rgba(0, 0, 0, 0.48);
  animation: record-spin var(--record-spin-duration) linear infinite;
}

.vinyl-record::before {
  content: "";
  position: absolute;
  inset: 2.8%;
  border-radius: 50%;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 24%, rgba(255, 255, 255, 0.035) 24.3% 24.8%, transparent 25.1% 42%, rgba(255, 255, 255, 0.028) 42.4% 42.9%, transparent 43.2%),
    radial-gradient(circle at 50% 50%,
      transparent 0 29.4%,
      rgba(255, 255, 255, 0.035) 29.75%,
      transparent 30.25%,
      transparent 45.6%,
      rgba(255, 255, 255, 0.03) 45.95%,
      transparent 46.45%,
      transparent 61.2%,
      rgba(255, 255, 255, 0.032) 61.55%,
      transparent 62.08%,
      transparent 74.2%,
      rgba(255, 255, 255, 0.03) 74.55%,
      transparent 75.1%,
      transparent 100%),
    repeating-radial-gradient(circle at 50% 50%,
      rgba(255, 255, 255, 0.026) 0 0.7px,
      transparent 0.7px 2.2px,
      rgba(0, 0, 0, 0.2) 2.2px 2.8px,
      transparent 2.8px 4.8px);
  mix-blend-mode: screen;
  opacity: 0.72;
}

.vinyl-record::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 68%, rgba(255, 255, 255, 0.035) 70%, transparent 72%),
    radial-gradient(circle at 50% 50%, transparent 0 92%, rgba(0, 0, 0, 0.28) 100%);
}

.vinyl-reflection {
  position: absolute;
  inset: 0;
  z-index: 4;
  border-radius: 50%;
  pointer-events: none;
  background:
    conic-gradient(from 292deg at 50% 50%,
      transparent 0deg 8deg,
      rgba(255, 255, 255, 0.08) 15deg,
      rgba(255, 255, 255, 0.36) 30deg,
      rgba(255, 255, 255, 0.2) 45deg,
      rgba(255, 255, 255, 0.07) 63deg,
      transparent 82deg 184deg,
      rgba(255, 255, 255, 0.06) 194deg,
      rgba(255, 255, 255, 0.3) 214deg,
      rgba(255, 255, 255, 0.17) 232deg,
      rgba(255, 255, 255, 0.055) 252deg,
      transparent 274deg 360deg),
    conic-gradient(from 292deg at 50% 50%,
      transparent 0deg 11deg,
      rgba(255, 56, 82, 0.17) 17deg,
      rgba(255, 218, 76, 0.2) 24deg,
      rgba(86, 255, 182, 0.16) 31deg,
      rgba(74, 176, 255, 0.2) 39deg,
      rgba(164, 112, 255, 0.14) 48deg,
      transparent 66deg 190deg,
      rgba(255, 56, 82, 0.12) 200deg,
      rgba(255, 218, 76, 0.15) 208deg,
      rgba(86, 255, 182, 0.12) 217deg,
      rgba(74, 176, 255, 0.15) 226deg,
      rgba(164, 112, 255, 0.11) 236deg,
      transparent 258deg 360deg),
    radial-gradient(ellipse at 24% 20%, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08) 26%, transparent 45%),
    radial-gradient(ellipse at 76% 71%, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.075) 25%, transparent 44%);
  mix-blend-mode: screen;
  opacity: 0.84;
  -webkit-mask-image: radial-gradient(circle at 50% 50%, transparent 0 22%, rgba(0, 0, 0, 0.72) 25.5%, #000 78%, transparent 99%);
  mask-image: radial-gradient(circle at 50% 50%, transparent 0 22%, rgba(0, 0, 0, 0.72) 25.5%, #000 78%, transparent 99%);
}

.vinyl-label {
  position: absolute;
  inset: 32%;
  z-index: 2;
  overflow: hidden;
  border-radius: 50%;
  background: var(--cover-url) center / cover no-repeat;
  box-shadow:
    0 0 0 3px rgba(0, 0, 0, 0.9),
    0 0 0 5px rgba(255, 255, 255, 0.05),
    inset 0 0 18px rgba(255, 255, 255, 0.15),
    inset 0 -22px 28px rgba(0, 0, 0, 0.24);
}

.vinyl-label::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(circle, transparent 0 10%, rgba(255, 255, 255, 0.14) 10.5% 11%, transparent 11.5%),
    radial-gradient(circle, transparent 0 72%, rgba(0, 0, 0, 0.18) 100%);
}

.vinyl-label::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 3;
  width: 8%;
  aspect-ratio: 1 / 1;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, #070708 0 44%, #3f4142 45% 63%, #070708 64% 100%);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.18),
    inset 0 1px 1px rgba(255, 255, 255, 0.18),
    inset 0 -1px 2px rgba(0, 0, 0, 0.8);
}

.screen-sheen {
  display: none;
}

.vfd-pad {
  padding: var(--mc-pad-card);
}

.readout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  min-height: 72px;
  padding: 14px 12px;
  border-radius: var(--mc-recessed-radius);
  background:
    linear-gradient(180deg, rgba(122, 235, 255, 0.08), rgba(5, 8, 10, 0.94)),
    #05080a;
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.12),
    inset 0 -1px 1px rgba(0, 0, 0, 0.74),
    inset 0 0 26px rgba(122, 235, 255, 0.06);
  color: #7aebff;
}

.readout-title,
.readout-artist,
.readout-mode {
  margin: 0;
  font-family: var(--font-condensed);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  text-shadow: 0 0 10px rgba(122, 235, 255, 0.42);
}

.readout-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 1.1rem;
  line-height: 1.15;
  font-weight: 700;
}

.readout-artist {
  margin-top: 4px;
  color: rgba(122, 235, 255, 0.62);
  font-size: 0.78rem;
}

.readout-mode {
  color: var(--color-accent-hot);
  font-size: 0.8rem;
  text-align: right;
  white-space: nowrap;
  text-shadow: 0 0 12px rgba(255, 209, 42, 0.38);
}

.section-recessed {
  padding: var(--mc-pad-recessed);
}

.track-list {
  display: flex;
  flex-direction: column;
  gap: var(--mc-gap-list);
}

.track-btn {
  justify-content: flex-start;
  width: 100%;
  gap: var(--mc-gap-rowitem);
  padding: var(--mc-pad-track) var(--mc-pad-tracktime) var(--mc-pad-track) var(--mc-pad-track);
  text-align: left;
}

.track-btn.is-selected {
  color: var(--color-text-primary);
  background:
    linear-gradient(180deg, rgba(40, 168, 216, 0.22), rgba(31, 36, 47, 0.92)),
    var(--color-control-surface);
}

.track-art {
  position: relative;
  width: 3rem;
  height: 3rem;
  flex: 0 0 auto;
  overflow: hidden;
  border-radius: var(--mc-control-radius-inner);
  background: #111;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
}

.cover-still {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: var(--cover-url) center / cover no-repeat;
  transition: opacity 0.16s ease-out, transform 0.22s ease-out;
}

.track-btn.is-selected .cover-still {
  opacity: 0;
  transform: translateY(14%);
}

.track-btn:not(.is-selected) .vinyl-record-stage.is-tile {
  display: none;
}

.track-btn.is-selected .vinyl-record-stage.is-tile {
  display: block;
}

.track-meta {
  display: flex;
  flex: 1 1 0;
  min-width: 0;
  flex-direction: column;
  overflow: hidden;
}

.track-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--color-text-primary);
}

.track-album {
  margin-top: 0.125rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.75rem;
  line-height: 1rem;
  color: var(--color-text-secondary);
}

.track-dur {
  flex-shrink: 0;
  font-size: 0.75rem;
  line-height: 1rem;
  color: var(--color-text-secondary);
  font-variant-numeric: tabular-nums;
}

@keyframes record-spin {
  from { transform: rotate(0turn); }
  to { transform: rotate(1turn); }
}

@keyframes record-drop {
  from {
    opacity: 0.74;
    transform: translate(-50%, var(--drop-from)) scale(0.965);
  }
  to {
    opacity: 1;
    transform: translate(-50%, var(--drop-to)) scale(1);
  }
}

@media (max-width: 520px) {
  .stage {
    padding: 24px 12px 52px;
  }

  .readout {
    grid-template-columns: minmax(0, 1fr);
    gap: 8px;
  }

  .readout-mode {
    text-align: left;
  }
}

@media (prefers-reduced-motion: reduce) {
  .vinyl-record-stage,
  .vinyl-record {
    animation-duration: 0.001ms;
    animation-iteration-count: 1;
  }
}
</style>
</head>
<body>
<main class="stage">
  <div class="stage-inner" id="vinylMockup">
    <section class="embossed-card" aria-labelledby="now-playing-title">
      <div class="cover-pad">
        <div class="recessed-card record-recessed">
          <div class="media-screen" id="turntableMount"></div>
        </div>
      </div>
      <div class="vfd-pad">
        <div class="readout" aria-live="polite">
          <div>
            <h1 class="readout-title" id="now-playing-title">Midnight City</h1>
            <p class="readout-artist" id="now-playing-artist">M83</p>
          </div>
          <p class="readout-mode">VINYL 33.5 RPM</p>
        </div>
      </div>
    </section>

    <section class="section-card" aria-labelledby="tracks-title">
      <div class="section-head"><span class="section-title" id="tracks-title">Popular Tracks</span></div>
      <div class="section-pad">
        <div class="recessed-card section-recessed">
          <div class="track-list" id="trackList"></div>
        </div>
      </div>
    </section>
  </div>
</main>

<script>
"use strict";

const tracks = [
  {
    title: "Midnight City",
    artist: "M83",
    album: "Hurry Up, We're Dreaming",
    duration: "4:03",
    palette: ["#15172b", "#363c88", "#f4b23d", "#f4f1dc"]
  },
  {
    title: "This Is the Day",
    artist: "The The",
    album: "Soul Mining",
    duration: "4:57",
    palette: ["#150e0d", "#a93623", "#f1c45b", "#f7efe1"]
  },
  {
    title: "Down Under",
    artist: "Men at Work",
    album: "Business as Usual",
    duration: "3:44",
    palette: ["#071b1d", "#0f7f80", "#f2d05d", "#eef8f7"]
  },
  {
    title: "Cherry-coloured Funk",
    artist: "Cocteau Twins",
    album: "Heaven or Las Vegas",
    duration: "3:12",
    palette: ["#20102c", "#c93e88", "#e7a7cf", "#fff4f7"]
  }
];

function coverUrl(track) {
  const [bg, mid, accent, ink] = track.palette;
  const title = escapeSvg(track.title);
  const artist = escapeSvg(track.artist);
  const album = escapeSvg(track.album);
  const svg = [
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">',
    '<rect width="600" height="600" fill="' + bg + '"/>',
    '<circle cx="156" cy="136" r="210" fill="' + mid + '" opacity=".82"/>',
    '<circle cx="460" cy="480" r="210" fill="' + accent + '" opacity=".8"/>',
    '<path d="M0 400 C140 330 260 520 600 318 L600 600 L0 600 Z" fill="' + ink + '" opacity=".18"/>',
    '<path d="M0 0 L600 600 M600 0 L0 600" stroke="' + ink + '" stroke-opacity=".12" stroke-width="18"/>',
    '<rect x="46" y="410" width="508" height="118" rx="20" fill="#000" opacity=".26"/>',
    '<text x="64" y="452" fill="' + ink + '" font-family="Barlow, Arial, sans-serif" font-size="44" font-weight="700">' + title + '</text>',
    '<text x="64" y="490" fill="' + ink + '" font-family="Barlow, Arial, sans-serif" font-size="26" font-weight="600" opacity=".9">' + artist + '</text>',
    '<text x="64" y="520" fill="' + ink + '" font-family="Barlow, Arial, sans-serif" font-size="20" font-weight="500" opacity=".72">' + album + '</text>',
    '</svg>'
  ].join("");
  return "data:image/svg+xml," + encodeURIComponent(svg);
}

function escapeSvg(value) {
  return value.replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&apos;"
  })[char]);
}

function cssUrl(url) {
  return 'url("' + url + '")';
}

function nowPlayingDeckMarkup() {
  return [
    turntableMarkup(),
    vinylRecordMarkup({ variant: "main" })
  ].join("");
}

function turntableMarkup() {
  return [
    '<div class="turntable-bed" aria-hidden="true">',
    '<span class="turntable-brand">',
    '<span class="turntable-brand-word is-music"><span>m</span><span>u</span><span>s</span><span>i</span><span>c</span></span>',
    '<span class="turntable-brand-word is-cloud"><span>c</span><span>l</span><span>o</span><span>u</span><span>d</span></span>',
    '</span>',
    '<span class="turntable-platter"></span>',
    '<span class="turntable-control">',
    '<span class="turntable-label is-33">33</span>',
    '<span class="turntable-label is-45">45</span>',
    '<span class="turntable-label is-on">ON</span>',
    '<span class="turntable-label is-standby">STANDBY</span>',
    '<span class="turntable-knob"></span>',
    '</span>',
    '<span class="turntable-led"></span>',
    '</div>',
    '<div class="slot-lip" aria-hidden="true"></div>',
    '<span class="turntable-spindle" aria-hidden="true"></span>',
    '<div class="screen-sheen" aria-hidden="true"></div>'
  ].join("");
}

function vinylRecordMarkup({ variant }) {
  const stageModifier = variant === "tile" ? "is-tile" : "is-main";
  return [
    '<div class="vinyl-record-stage ' + stageModifier + '" aria-hidden="true">',
    '<span class="vinyl-ground-shadow"></span>',
    '<div class="vinyl-record">',
    '<span class="vinyl-label"></span>',
    '</div>',
    '<span class="vinyl-reflection"></span>',
    '</div>'
  ].join("");
}

const mockup = document.getElementById("vinylMockup");
const turntableMount = document.getElementById("turntableMount");
const trackList = document.getElementById("trackList");
const titleNode = document.getElementById("now-playing-title");
const artistNode = document.getElementById("now-playing-artist");

turntableMount.innerHTML = nowPlayingDeckMarkup();

tracks.forEach((track, index) => {
  track.cover = coverUrl(track);
  const button = document.createElement("button");
  button.type = "button";
  button.className = "emb-btn track-btn";
  button.dataset.index = String(index);
  button.style.setProperty("--cover-url", cssUrl(track.cover));
  button.innerHTML = [
    '<span class="track-art">',
    '<span class="cover-still"></span>',
    vinylRecordMarkup({ variant: "tile" }),
    '</span>',
    '<span class="track-meta">',
    '<span class="track-name"></span>',
    '<span class="track-album"></span>',
    '</span>',
    '<span class="track-dur"></span>'
  ].join("");
  button.querySelector(".track-name").textContent = track.title;
  button.querySelector(".track-album").textContent = track.album;
  button.querySelector(".track-dur").textContent = track.duration;
  button.addEventListener("click", () => selectTrack(index));
  trackList.append(button);
});

function selectTrack(index) {
  const track = tracks[index];
  mockup.style.setProperty("--cover-url", cssUrl(track.cover));
  titleNode.textContent = track.title;
  artistNode.textContent = track.artist;

  for (const button of trackList.querySelectorAll(".track-btn")) {
    const selected = button.dataset.index === String(index);
    button.classList.toggle("is-selected", selected);
    button.setAttribute("aria-pressed", selected ? "true" : "false");
  }

  restartRecordDrop();
}

function restartRecordDrop() {
  const carriers = mockup.querySelectorAll(".vinyl-record-stage");
  for (const carrier of carriers) {
    carrier.style.animation = "none";
  }
  void mockup.offsetWidth;
  for (const carrier of carriers) {
    carrier.style.animation = "";
  }
}

selectTrack(0);
</script>
</body>
</html>
