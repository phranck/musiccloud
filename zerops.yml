zerops:
  - setup: backend
    build:
      base: nodejs@22
      buildCommands:
        - corepack enable
        - corepack prepare pnpm@10.33.1 --activate
        - pnpm install --frozen-lockfile
        - pnpm --filter @musiccloud/shared build
        - pnpm --filter @musiccloud/backend build
      deployFiles:
        - apps/backend/dist
        - apps/backend/src/db/migrations
    run:
      base: nodejs@22
      ports:
        - port: 4000
          httpSupport: true
      envVariables:
        HOST: 0.0.0.0
        PORT: "4000"
        NODE_ENV: production
        ALLOWED_ORIGINS: "https://musiccloud.io,https://dashboard.musiccloud.io"
        CORS_ORIGIN: "https://musiccloud.io,https://dashboard.musiccloud.io"
        # Number of reverse-proxy hops to trust when resolving the client
        # IP from X-Forwarded-For. "1" covers the Zerops ingress. If a
        # CDN (e.g. Cloudflare) is placed in front, bump to "2".
        TRUST_PROXY: "1"
        # Set these in Zerops Secrets:
        # DATABASE_URL: postgresql://db:password@postgresql:5432/musiccloud
        # JWT_SECRET: <random 64-char string>
        # INTERNAL_API_KEY: <shared secret between frontend and backend>
        # SPOTIFY_CLIENT_ID: <from Spotify Developer Dashboard>
        # SPOTIFY_CLIENT_SECRET: <from Spotify Developer Dashboard>
        # APPLE_MUSIC_TOKEN: <or APPLE_MUSIC_KEY_ID + TEAM_ID + PRIVATE_KEY>
        # YOUTUBE_API_KEY: <from Google Cloud Console>
        # API_CLIENT_ID: <for public OAuth clients>
        # API_CLIENT_SECRET: <for public OAuth clients>
        # LASTFM_API_KEY: <from Last.fm API account>
        # TICKETMASTER_CONSUMER_KEY: <from Ticketmaster Developer Portal>
        # BANDSINTOWN_APP_ID: <from Bandsintown Developer Portal>
        # PUBLIC_URL: <public site origin, e.g. https://musiccloud.io; used for email banner asset URLs>
        # DASHBOARD_URL: <dashboard origin, e.g. https://dashboard.musiccloud.io; used for invite + login links>
        # BREVO_API_KEY: <from Brevo -> SMTP & API -> API keys>
        # EMAIL_FROM_ADDRESS: <verified Brevo sender address, e.g. noreply@musiccloud.io>
        # EMAIL_FROM_NAME: <display name for outgoing emails, e.g. musiccloud>
      initCommands:
        - "true"
      start: node apps/backend/dist/server.js
      # Readiness probe: /health/ready returns 503 with the missing-table
      # list if a migration silently failed and a hot-path table is gone.
      # Zerops marks the container un-ready and keeps it out of rotation
      # until the schema is consistent again.
      healthCheck:
        httpGet:
          port: 4000
          path: /health/ready
      # Per-minute crawler heartbeat. Each tick is idempotent (lock-protected
      # via crawl_state.running_since with 30min stale-detection); concurrent
      # ticks across replicas exit cleanly when the lock is held. Single
      # container is enough for the work this MVP does — flip allContainers
      # to true if scaling out warrants spreading per-source ticks.
      crontab:
        - command: "node apps/backend/dist/scripts/crawler-heartbeat.js"
          timing: "* * * * *"
          allContainers: false
          workingDir: /var/www

  - setup: frontend
    build:
      base: nodejs@22
      buildCommands:
        - corepack enable
        - corepack prepare pnpm@10.33.1 --activate
        - pnpm install --frozen-lockfile
        - pnpm --filter @musiccloud/shared build
        - pnpm --filter @musiccloud/frontend build
      deployFiles:
        - apps/frontend/dist
        - apps/frontend/node_modules
        - apps/frontend/package.json
        - node_modules
        - packages/shared
        - package.json
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        HOST: 0.0.0.0
        PORT: "3000"
        BACKEND_URL: http://backend:4000
        # Set in Zerops Secrets:
        # INTERNAL_API_KEY: <same key as backend>
      start: node apps/frontend/dist/server/entry.mjs

  - setup: dashboard
    build:
      base: nodejs@22
      buildCommands:
        - corepack enable
        - corepack prepare pnpm@10.33.1 --activate
        - pnpm install --frozen-lockfile
        - pnpm --filter @musiccloud/shared build
        - pnpm --filter @musiccloud/dashboard build
        - cp -r apps/dashboard/dist/. .
        - cp apps/dashboard/site_config.tmpl .
      deployFiles:
        - index.html
        - assets
        - fonts
        - icons
        - img
        - site_config.tmpl
    run:
      base: nginx@1.22
      ports:
        - port: 80
          httpSupport: true
      siteConfigPath: site_config.tmpl
