name: Deploy to Zerops

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'zerops.yml'
            frontend:
              - 'apps/frontend/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'zerops.yml'
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'zerops.yml'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zCLI
        run: curl -L https://zerops.io/zcli/install.sh | sh
      - name: Login
        run: zcli login ${{ secrets.ZEROPS_TOKEN }}
      - name: Deploy
        run: zcli push --setup backend

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zCLI
        run: curl -L https://zerops.io/zcli/install.sh | sh
      - name: Login
        run: zcli login ${{ secrets.ZEROPS_TOKEN }}
      - name: Deploy
        run: zcli push --setup frontend

  deploy-dashboard:
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zCLI
        run: curl -L https://zerops.io/zcli/install.sh | sh
      - name: Login
        run: zcli login ${{ secrets.ZEROPS_TOKEN }}
      - name: Deploy
        run: zcli push --setup dashboard
