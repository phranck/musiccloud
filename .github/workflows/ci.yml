name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Shared
        run: npx tsc --noEmit --project packages/shared/tsconfig.json
      - name: Backend
        run: npx tsc --noEmit --project apps/backend/tsconfig.json
      - name: Frontend
        run: npx astro check --root apps/frontend
      - name: Dashboard
        run: npx tsc --noEmit --project apps/dashboard/tsconfig.json
      - name: Tests
        run: npm run test:run --workspaces --if-present

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"

          if [[ -z "$before_sha" || "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            mapfile -t changed_files < <(git ls-tree -r --name-only "$head_sha")
          else
            mapfile -t changed_files < <(git diff --name-only "$before_sha" "$head_sha")
          fi

          backend=false
          frontend=false
          dashboard=false

          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/backend/*|packages/shared/*|package.json|package-lock.json|zerops.yml)
                backend=true ;;
            esac
            case "$file" in
              apps/frontend/*|packages/shared/*|package.json|package-lock.json|zerops.yml)
                frontend=true ;;
            esac
            case "$file" in
              apps/backend/*|apps/dashboard/*|packages/shared/*|package.json|package-lock.json|zerops.yml|.github/workflows/ci.yml)
                dashboard=true ;;
            esac
          done

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "dashboard=$dashboard"
          } >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install Zerops CLI
        run: |
          curl -fsSL https://github.com/zeropsio/zcli/releases/latest/download/zcli-linux-amd64 -o /usr/local/bin/zcli
          chmod +x /usr/local/bin/zcli
      - name: Deploy and wait
        env:
          ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
        run: |
          zcli login "$ZEROPS_TOKEN"
          zcli push --serviceId vftiwXaYQGCnnwEEaiGPYA

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install Zerops CLI
        run: |
          curl -fsSL https://github.com/zeropsio/zcli/releases/latest/download/zcli-linux-amd64 -o /usr/local/bin/zcli
          chmod +x /usr/local/bin/zcli
      - name: Deploy and wait
        env:
          ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
        run: |
          zcli login "$ZEROPS_TOKEN"
          zcli push --serviceId bMY4g66BRDOfq1AAi8Q85A

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install Zerops CLI
        run: |
          curl -fsSL https://github.com/zeropsio/zcli/releases/latest/download/zcli-linux-amd64 -o /usr/local/bin/zcli
          chmod +x /usr/local/bin/zcli
      - name: Deploy and wait
        env:
          ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
        run: |
          zcli login "$ZEROPS_TOKEN"
          zcli push --serviceId IF9Xp4YFRxuQKRQxmAWFBA
