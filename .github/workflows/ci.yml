name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:

# PR runs cancel on a new push: only checks run there, so an abort is free and
# saves a CI slot. `main` runs serialize instead (cancel-in-progress: false) —
# every main push deploys, and cancelling an in-flight run could abort a Zerops
# deploy mid-push. Queuing lets the newest run land last, on the complete tree,
# with no overtaking between back-to-back merges.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Every job starts with checkout-only repository access. The job-level blocks
# below replace this baseline only for Actions metadata lookup or SDK release
# publication.
permissions:
  contents: read

jobs:
  detect-validation-changes:
    name: Detect Validation Changes
    runs-on: ubuntu-latest
    if: always()
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      developer: ${{ steps.filter.outputs.developer }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      dashboard_ui: ${{ steps.filter.outputs.dashboard_ui }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect changed validation paths
        id: filter
        shell: bash
        env:
          HEAD_SHA: ${{ github.sha }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          head_sha="$HEAD_SHA"
          base_sha="$PULL_REQUEST_BASE_SHA"
          if [[ -z "$base_sha" ]]; then
            base_sha="$PUSH_BEFORE_SHA"
          fi

          use_full_tree=false
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            use_full_tree=true
          elif ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            use_full_tree=true
          fi

          if [[ "$use_full_tree" == true ]]; then
            mapfile -t changed_files < <(git ls-tree -r --name-only "$head_sha")
          else
            mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")
          fi

          all=false
          shared=false
          backend=false
          frontend=false
          developer=false
          dashboard=false
          dashboard_ui=false

          for file in "${changed_files[@]}"; do
            case "$file" in
              .github/workflows/ci.yml|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig*.json)
                all=true ;;
              packages/shared/*)
                shared=true
                backend=true
                frontend=true
                developer=true
                dashboard=true ;;
              apps/backend/*)
                backend=true
                developer=true ;;
              apps/frontend/*)
                frontend=true ;;
              apps/developer/*)
                developer=true ;;
              apps/dashboard/*)
                dashboard=true ;;
              packages/dashboard-ui/*)
                dashboard_ui=true
                dashboard=true ;;
            esac
          done

          if [[ "$all" == true ]]; then
            shared=true
            backend=true
            frontend=true
            developer=true
            dashboard=true
            dashboard_ui=true
          fi

          # Every application that imports @musiccloud/shared needs its current
          # declaration output before TypeScript or Astro resolves it.
          if [[ "$backend" == true || "$frontend" == true || "$developer" == true || "$dashboard" == true ]]; then
            shared=true
          fi

          {
            echo "shared=$shared"
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "developer=$developer"
            echo "dashboard=$dashboard"
            echo "dashboard_ui=$dashboard_ui"
          } >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: corepack enable pnpm
      - run: corepack prepare pnpm@10.33.1 --activate
      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Validate affected workspaces
    runs-on: ubuntu-latest
    needs: detect-validation-changes
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: corepack enable pnpm
      - run: corepack prepare pnpm@10.33.1 --activate
      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        if: needs.detect-validation-changes.outputs.shared == 'true'
        run: pnpm --filter @musiccloud/shared build
      - name: Shared
        if: needs.detect-validation-changes.outputs.shared == 'true'
        run: pnpm exec tsc --noEmit --project packages/shared/tsconfig.json
      - name: Backend
        if: needs.detect-validation-changes.outputs.backend == 'true'
        run: pnpm exec tsc --noEmit --project apps/backend/tsconfig.json
      - name: Frontend
        if: needs.detect-validation-changes.outputs.frontend == 'true'
        run: pnpm --filter @musiccloud/frontend check
      - name: Generate developer API reference
        if: needs.detect-validation-changes.outputs.developer == 'true'
        run: pnpm --filter @musiccloud/developer run prebuild
      - name: Developer
        if: needs.detect-validation-changes.outputs.developer == 'true'
        run: pnpm --filter @musiccloud/developer typecheck
      - name: Dashboard UI
        if: needs.detect-validation-changes.outputs.dashboard_ui == 'true'
        run: pnpm --filter @musiccloud/dashboard-ui typecheck
      - name: Dashboard
        if: needs.detect-validation-changes.outputs.dashboard == 'true'
        run: pnpm --filter @musiccloud/dashboard typecheck
      - name: Workflow and deployment contracts
        run: node --test scripts/ci-workflow.test.mjs scripts/zerops-deploy.test.mjs scripts/readme-links.test.mjs
      - name: Shared tests
        if: needs.detect-validation-changes.outputs.shared == 'true'
        run: pnpm --filter @musiccloud/shared test:run
      - name: Backend tests
        if: needs.detect-validation-changes.outputs.backend == 'true'
        run: pnpm --filter @musiccloud/backend test:run
      - name: Frontend tests
        if: needs.detect-validation-changes.outputs.frontend == 'true'
        run: pnpm --filter @musiccloud/frontend test:run
      - name: Developer tests
        if: needs.detect-validation-changes.outputs.developer == 'true'
        run: pnpm --filter @musiccloud/developer test:run
      - name: Dashboard tests
        if: needs.detect-validation-changes.outputs.dashboard == 'true'
        run: pnpm --filter @musiccloud/dashboard test:run

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    if: github.event_name == 'push'
    # `contents: read` for the checkout, `actions: read` so `gh run list` can
    # look up the last successful run of this workflow (the diff base below).
    permissions:
      contents: read
      actions: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      developer: ${{ steps.filter.outputs.developer }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      api_sdk: ${{ steps.filter.outputs.api_sdk }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        shell: bash
        env:
          # Passed through env (not inlined into the script) so these run-context
          # values cannot break out of the shell. Both are commit SHAs.
          HEAD_SHA: ${{ github.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          head_sha="$HEAD_SHA"

          # Diff base is the head SHA of the last SUCCESSFUL run of this workflow
          # on main, not github.event.before. A push that fails before its deploy
          # jobs (e.g. at lint) must not "consume" its file changes: with
          # github.event.before the next green push would diff only against the
          # failed push and never re-evaluate the stranded paths, silently
          # skipping that service's deploy. Anchoring to the last green run
          # re-includes everything changed since the last real deploy, so a
          # lint-fix follow-up still deploys whatever the failed push touched.
          before_sha=$(gh run list \
            --workflow ci.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // empty' 2>/dev/null || true)

          # Fall back to the push's own before-ref if the lookup yields nothing
          # (e.g. no prior successful run, or the API call failed).
          if [[ -z "$before_sha" ]]; then
            before_sha="$PUSH_BEFORE_SHA"
          fi

          # Treat every tracked file as changed when there is no usable base:
          # the zero-SHA of a branch's first push, or a base commit that is not
          # present in this checkout (e.g. after a force-push rewrites history).
          use_full_tree=false
          if [[ -z "$before_sha" || "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            use_full_tree=true
          elif ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
            use_full_tree=true
          fi

          if [[ "$use_full_tree" == true ]]; then
            mapfile -t changed_files < <(git ls-tree -r --name-only "$head_sha")
          else
            mapfile -t changed_files < <(git diff --name-only "$before_sha" "$head_sha")
          fi

          backend=false
          frontend=false
          developer=false
          dashboard=false
          api_sdk=false

          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/backend/*|packages/shared/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|zerops.yml)
                backend=true ;;
            esac
            case "$file" in
              apps/frontend/*|packages/shared/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|zerops.yml)
                frontend=true ;;
            esac
            case "$file" in
              apps/backend/*|apps/developer/*|packages/shared/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|zerops.yml)
                developer=true ;;
            esac
            case "$file" in
              apps/dashboard/*|packages/shared/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|zerops.yml)
                dashboard=true ;;
            esac
            case "$file" in
              apps/backend/src/server.ts|apps/backend/src/routes/*|apps/backend/src/schemas/*|apps/backend/src/docs/*|apps/backend/src/openapi/*|apps/backend/src/scripts/export-public-openapi.ts|apps/developer/scripts/generate-api-reference.mjs|apps/developer/src/lib/openapi-reference.ts|apps/developer/src/lib/sdk-catalog.ts|scripts/generate-sdk-release.mjs|scripts/generate-sdk-release.test.mjs|scripts/fixtures/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                api_sdk=true ;;
            esac
          done

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "developer=$developer"
            echo "dashboard=$dashboard"
            echo "api_sdk=$api_sdk"
          } >> "$GITHUB_OUTPUT"

  validate-api-sdk-contract:
    name: Validate API SDK Contract
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect contract-relevant PR paths
        id: api_sdk_changes
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune --depth=1 origin "$BASE_REF"
          mapfile -t changed_files < <(git diff --name-only "origin/$BASE_REF"...HEAD)

          should_run=false
          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/backend/src/server.ts|apps/backend/src/routes/*|apps/backend/src/schemas/*|apps/backend/src/docs/*|apps/backend/src/openapi/*|apps/backend/src/scripts/export-public-openapi.ts|apps/developer/scripts/generate-api-reference.mjs|apps/developer/src/lib/openapi-reference.ts|apps/developer/src/lib/sdk-catalog.ts|scripts/generate-sdk-release.mjs|scripts/generate-sdk-release.test.mjs|scripts/fixtures/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                should_run=true ;;
            esac
          done

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v5
        if: steps.api_sdk_changes.outputs.should_run == 'true'
        with:
          node-version: 22
          package-manager-cache: false
      - name: Prepare pnpm
        if: steps.api_sdk_changes.outputs.should_run == 'true'
        run: |
          corepack enable pnpm
          corepack prepare pnpm@10.33.1 --activate
      - name: Restore pnpm store
        if: steps.api_sdk_changes.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - name: Install dependencies
        if: steps.api_sdk_changes.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build shared package
        if: steps.api_sdk_changes.outputs.should_run == 'true'
        run: pnpm --filter @musiccloud/shared build
      - name: Confirm Docker is available for SDK generation
        if: steps.api_sdk_changes.outputs.should_run == 'true'
        run: docker --version
      - name: Export public OpenAPI and run SDK fixture validation
        if: steps.api_sdk_changes.outputs.should_run == 'true'
        run: |
          pnpm openapi:export
          pnpm sdk:test

  publish-api-sdks:
    name: Publish API SDKs
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api_sdk == 'true'
    # Creating or reusing the immutable SDK release is the workflow's only
    # repository mutation, so this is the sole `contents: write` exception.
    permissions:
      contents: write
    outputs:
      api_version: ${{ steps.contract.outputs.api_version }}
      openapi_sha256: ${{ steps.contract.outputs.openapi_sha256 }}
      release_tag: ${{ steps.contract.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Prepare pnpm
        run: |
          corepack enable pnpm
          corepack prepare pnpm@10.33.1 --activate
      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm --filter @musiccloud/shared build
      - name: Confirm Docker is available for SDK generation
        run: docker --version
      - name: Generate release-ready SDK artifacts
        run: |
          pnpm openapi:export
          pnpm sdk:generate
      - name: Record contract outputs
        id: contract
        run: |
          api_version=$(node -e 'const fs=require("node:fs"); const m=JSON.parse(fs.readFileSync(".tmp/openapi/openapi.metadata.json","utf8")); process.stdout.write(m.version)')
          openapi_sha256=$(node -e 'const fs=require("node:fs"); const m=JSON.parse(fs.readFileSync(".tmp/openapi/openapi.metadata.json","utf8")); process.stdout.write(m.sha256)')
          {
            echo "api_version=$api_version"
            echo "openapi_sha256=$openapi_sha256"
            echo "release_tag=api-sdk-v$api_version"
          } >> "$GITHUB_OUTPUT"
      - name: Detect existing SDK release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.contract.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify existing immutable SDK release
        if: steps.release.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.contract.outputs.release_tag }}
        run: |
          mkdir -p .tmp/existing-sdk
          gh release download "$RELEASE_TAG" --dir .tmp/existing-sdk --clobber
          node - <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");

          const local = JSON.parse(fs.readFileSync(".tmp/sdk/sdk-catalog.json", "utf8"));
          const remote = JSON.parse(fs.readFileSync(".tmp/existing-sdk/sdk-catalog.json", "utf8"));

          // Existing SDK releases are immutable. A reused tag is valid when the
          // public contract, generator version, and generated assets are equal.
          // `sourceSha` remains provenance in the catalog but backend-only fixes
          // must not require a new API version or duplicate SDK release.
          for (const field of ["apiVersion", "openApiSha256", "generatorVersion"]) {
            if (local[field] !== remote[field]) {
              throw new Error(`Existing SDK release mismatch: ${field}`);
            }
          }
          if (JSON.stringify(local.assets) !== JSON.stringify(remote.assets)) {
            throw new Error("Existing SDK release mismatch: asset catalog");
          }
          for (const asset of remote.assets) {
            const archivePath = path.join(".tmp/existing-sdk", asset.archiveName);
            const actual = crypto.createHash("sha256").update(fs.readFileSync(archivePath)).digest("hex");
            if (actual !== asset.sha256) {
              throw new Error(`Existing SDK release asset checksum mismatch: ${asset.archiveName}`);
            }
          }
          NODE
      - name: Create immutable SDK release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.contract.outputs.release_tag }}
          API_VERSION: ${{ steps.contract.outputs.api_version }}
          OPENAPI_SHA256: ${{ steps.contract.outputs.openapi_sha256 }}
        run: |
          gh release create "$RELEASE_TAG" \
            .tmp/sdk/musiccloud-typescript-sdk-"$API_VERSION".zip \
            .tmp/sdk/musiccloud-python-sdk-"$API_VERSION".zip \
            .tmp/sdk/musiccloud-swift-sdk-"$API_VERSION".zip \
            .tmp/sdk/sdk-catalog.json \
            --title "musiccloud API SDKs v$API_VERSION" \
            --notes "Generated from public OpenAPI $API_VERSION ($OPENAPI_SHA256)."

  # All deploy jobs inherit `contents: read`. Zerops mutations and status
  # dispatches authenticate only through their explicit ZEROPS_TOKEN and
  # fine-grained STATUS_DISPATCH_TOKEN secrets, never an elevated GITHUB_TOKEN.
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    # Auto-announces the deploy on status.musiccloud.io (MC-062): a repository_dispatch
    # opens a maintenance banner before the push and closes it after. Guarded by
    # env.STATUS_TOKEN so it stays inert if the STATUS_DISPATCH_TOKEN secret
    # (fine-grained PAT with contents:write on the status repo) is absent.
    env:
      STATUS_TOKEN: ${{ secrets.STATUS_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Announce deploy start
        if: env.STATUS_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.STATUS_TOKEN }}
        run: |
          gh api repos/phranck/status.musiccloud.io/dispatches --input - <<'JSON'
          {"event_type":"deploy_start","client_payload":{"service":"Backend","slug":"backend"}}
          JSON
      - name: Install Zerops CLI
        run: |
          curl -fsSL https://github.com/zeropsio/zcli/releases/latest/download/zcli-linux-amd64 -o /usr/local/bin/zcli
          chmod +x /usr/local/bin/zcli
      - name: Deploy and wait
        env:
          ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
        run: |
          zcli login "$ZEROPS_TOKEN"
          ./scripts/zerops-deploy.sh vftiwXaYQGCnnwEEaiGPYA
          # Zerops confirms the artifact deploy, not that the process has bound
          # its public port. Require the backend's runtime health boundary so a
          # crash during startup fails the deployment instead of reporting green.
          curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 https://api.musiccloud.io/health/backend
      - name: Announce deploy end
        if: always() && env.STATUS_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.STATUS_TOKEN }}
        run: |
          gh api repos/phranck/status.musiccloud.io/dispatches --input - <<'JSON'
          {"event_type":"deploy_end","client_payload":{"service":"Backend","slug":"backend"}}
          JSON

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    env:
      STATUS_TOKEN: ${{ secrets.STATUS_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Announce deploy start
        if: env.STATUS_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.STATUS_TOKEN }}
        run: |
          gh api repos/phranck/status.musiccloud.io/dispatches --input - <<'JSON'
          {"event_type":"deploy_start","client_payload":{"service":"Frontend","slug":"frontend"}}
          JSON
      - name: Install Zerops CLI
        run: |
          curl -fsSL https://github.com/zeropsio/zcli/releases/latest/download/zcli-linux-amd64 -o /usr/local/bin/zcli
          chmod +x /usr/local/bin/zcli
      - name: Deploy and wait
        env:
          ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
        run: |
          zcli login "$ZEROPS_TOKEN"
          ./scripts/zerops-deploy.sh bMY4g66BRDOfq1AAi8Q85A
      - name: Announce deploy end
        if: always() && env.STATUS_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.STATUS_TOKEN }}
        run: |
          gh api repos/phranck/status.musiccloud.io/dispatches --input - <<'JSON'
          {"event_type":"deploy_end","client_payload":{"service":"Frontend","slug":"frontend"}}
          JSON

  deploy-developer:
    name: Deploy Developer
    runs-on: ubuntu-latest
    needs: [detect-changes, publish-api-sdks]
    if: always() && needs.detect-changes.outputs.developer == 'true' && (needs.publish-api-sdks.result == 'success' || needs.publish-api-sdks.result == 'skipped')
    env:
      STATUS_TOKEN: ${{ secrets.STATUS_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Announce deploy start
        if: env.STATUS_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.STATUS_TOKEN }}
        run: |
          gh api repos/phranck/status.musiccloud.io/dispatches --input - <<'JSON'
          {"event_type":"deploy_start","client_payload":{"service":"Developer Site","slug":"developer-site"}}
          JSON
      - name: Install Zerops CLI
        run: |
          curl -fsSL https://github.com/zeropsio/zcli/releases/latest/download/zcli-linux-amd64 -o /usr/local/bin/zcli
          chmod +x /usr/local/bin/zcli
      - name: Deploy and wait
        env:
          ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
        run: |
          zcli login "$ZEROPS_TOKEN"
          ./scripts/zerops-deploy.sh snJHAWsxR32xetGASY33cQ
      - name: Announce deploy end
        if: always() && env.STATUS_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.STATUS_TOKEN }}
        run: |
          gh api repos/phranck/status.musiccloud.io/dispatches --input - <<'JSON'
          {"event_type":"deploy_end","client_payload":{"service":"Developer Site","slug":"developer-site"}}
          JSON

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    env:
      STATUS_TOKEN: ${{ secrets.STATUS_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Announce deploy start
        if: env.STATUS_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.STATUS_TOKEN }}
        run: |
          gh api repos/phranck/status.musiccloud.io/dispatches --input - <<'JSON'
          {"event_type":"deploy_start","client_payload":{"service":"Dashboard","slug":"dashboard"}}
          JSON
      - name: Install Zerops CLI
        run: |
          curl -fsSL https://github.com/zeropsio/zcli/releases/latest/download/zcli-linux-amd64 -o /usr/local/bin/zcli
          chmod +x /usr/local/bin/zcli
      - name: Deploy and wait
        env:
          ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
        run: |
          zcli login "$ZEROPS_TOKEN"
          ./scripts/zerops-deploy.sh IF9Xp4YFRxuQKRQxmAWFBA
      - name: Announce deploy end
        if: always() && env.STATUS_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.STATUS_TOKEN }}
        run: |
          gh api repos/phranck/status.musiccloud.io/dispatches --input - <<'JSON'
          {"event_type":"deploy_end","client_payload":{"service":"Dashboard","slug":"dashboard"}}
          JSON
