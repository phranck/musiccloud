name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shared:
    name: Shared Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc --noEmit --project packages/shared/tsconfig.json
      - run: npm run build --workspace=packages/shared

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npx tsc --noEmit --project apps/dashboard/tsconfig.json
      - run: npm run test:run --workspace=apps/dashboard --if-present

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npx tsc --noEmit --project apps/backend/tsconfig.json
      - run: npm run test:run --workspace=apps/backend --if-present

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: shared
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npx astro check --root apps/frontend
      - run: npm run test:run --workspace=apps/frontend --if-present
