# Gource Configuration: musiccloud WebApp
# Usage: ./mkgource
# Audio and HLS packaging are handled by ./mkgource after Gource renders.
# Gource itself has no background-audio or crossfade-loop setting.

[display]
viewport=2560x1440
fullscreen=false
output-framerate=60

[gource]
# Timing
seconds-per-day=13
auto-skip-seconds=1
time-scale=1.0
max-file-lag=0.3

# Appearance
title=musiccloud.io
font-size=18
font-colour=AAAAAA
background-colour=0D1117
date-format=%d.%m.%Y %H:%M

# Tree
dir-name-depth=4
dir-name-position=0.5
file-idle-time=0
file-idle-time-at-end=0

# Elements
bloom-intensity=0.3
bloom-multiplier=0.5
elasticity=0.1
max-files=0

# Users
user-scale=1.4
user-friction=0.2
highlight-users=true
highlight-colour=58A6FF

# Camera
camera-mode=overview
padding=1.2

# Hide
hide=mouse,progress

# Key
key=false

# Filters
file-filter=package-lock\.json
file-filter=node_modules/
file-filter=\.DS_Store
file-filter=dist/

file-extensions=false

[colour]
# TypeScript / JavaScript
*.ts=4FC1FF
*.tsx=61DAFB
*.js=F7DF1E
*.jsx=61DAFB

# Astro
*.astro=FF5D01

# Styles
*.css=264DE4
*.scss=CF649A

# Config / Data
*.json=A8B1C2
*.yaml=CB171E
*.yml=CB171E
*.toml=9C4121
*.conf=A8B1C2

# Markup / Docs
*.md=FFFFFF
*.html=E34C26
*.svg=FFB13B

# Shell
*.sh=4EAA25
